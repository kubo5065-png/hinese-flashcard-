<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国語単語帳</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        /* メニュー画面のスタイル */
        #menu {
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .menu-title {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 40px;
            font-weight: bold;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 0 20px;
        }

        .menu-btn {
            padding: 20px;
            font-size: 1.5rem;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            background-color: white;
            color: #007bff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, background-color 0.2s;
            font-weight: bold;
        }

        .menu-btn:active {
            transform: scale(0.98);
            background-color: #f8f9fa;
        }

        /* アプリ画面（最初は非表示） */
        #app {
            display: none;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card {
            background: white;
            width: 90%;
            max-width: 400px;
            height: 300px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            cursor: pointer;
            transition: transform 0.2s;
            margin-bottom: 20px;
        }

        .card:active {
            transform: scale(0.98);
        }

        .word {
            font-size: 3rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .pinyin {
            font-size: 1.2rem;
            color: #666;
            margin-top: 15px;
            /* 下に表示するので上マージン */
            display: none;
            /* 最初は隠す */
        }

        .meaning {
            font-size: 1.5rem;
            color: #007bff;
            margin-top: 20px;
            display: none;
            /* 最初は隠す */
        }

        .controls {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            padding: 0 16px;
        }

        button {
            padding: 14px 22px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        button.secondary {
            background-color: #6c757d;
        }

        button.back-btn {
            background-color: transparent;
            color: #666;
            box-shadow: none;
            padding: 10px;
            margin-bottom: 10px;
            align-self: flex-start;
            margin-left: 5%;
        }

        /* 答えを表示するクラス */
        .show-answer .pinyin,
        .show-answer .meaning {
            display: block;
        }
    </style>
</head>

<body>

    <!-- メニュー画面 -->
    <div id="menu">
        <div class="menu-title">中国語単語帳</div>
        <div class="menu-buttons">
            <button class="menu-btn" onclick="startCategory('noun')">📛 名詞</button>
            <button class="menu-btn" onclick="startCategory('verb')">🏃‍♂️ 動詞</button>
            <button class="menu-btn" onclick="startCategory('adj')">✨ 形容詞</button>
            <button class="menu-btn" onclick="startCategory('phrase')">💬 フレーズ</button>
        </div>
    </div>

    <!-- アプリ画面 -->
    <div id="app" style="display: none;">
        <button class="back-btn" onclick="showMenu()">⬅ メニューに戻る</button>

        <div class="card" id="flashcard" onclick="toggleAnswer()">
            <!-- 順番を変更: 意味 -> 単語 -> ピンイン -->
            <div class="meaning" id="meaningDisplay">こんにちは</div>
            <div class="word" id="wordDisplay">你好</div>
            <div class="pinyin" id="pinyinDisplay">nǐ hǎo</div>
        </div>

        <div class="controls">
            <button onclick="previousWord(event)">⬅ 戻る</button>
            <button class="secondary" onclick="speakWord(event)">🔊 発音</button>
            <button onclick="nextWord(event)">次へ ➡</button>
        </div>
    </div>

    <script>
        // カテゴリごとのスプレッドシートURL（★後で正しいURLに書き換えます）
        // 現在はすべて同じURL（名詞シート）を入れています
        const CATEGORY_URLS = {
            noun: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSp0L2zrFkUsmtg0ypB9415mTJESb4FXXyXTYFMP-5JIEfdcKhlioH9Q_TSeYVvb62yIAM7jCCfo47m/pub?gid=0&single=true&output=csv',
            verb: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSp0L2zrFkUsmtg0ypB9415mTJESb4FXXyXTYFMP-5JIEfdcKhlioH9Q_TSeYVvb62yIAM7jCCfo47m/pub?gid=744521802&single=true&output=csv',
            adj: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSp0L2zrFkUsmtg0ypB9415mTJESb4FXXyXTYFMP-5JIEfdcKhlioH9Q_TSeYVvb62yIAM7jCCfo47m/pub?gid=2137241940&single=true&output=csv',
            phrase: 'https://docs.google.com/spreadsheets/d/1Jo9cdFYuCQpBCCkIHb2HK3lotFDehg72yY_48ZdhkjU/export?format=csv&gid=1766247776'
        };

        // CORS回避用プロキシ
        const PROXY_URL = 'https://api.allorigins.win/raw?url=';
        const FETCH_TIMEOUT_MS = 8000;

        // サンプルデータ
        const defaultData = [
            { word: "你好", pinyin: "nǐ hǎo", meaning: "こんにちは" },
            { word: "谢谢", pinyin: "xiè xie", meaning: "ありがとう" }
        ];

        let vocabulary = [];
        let currentIndex = 0;

        const menuScreen = document.getElementById('menu');
        const appScreen = document.getElementById('app');
        const card = document.getElementById('flashcard');
        const wordDisplay = document.getElementById('wordDisplay');
        const pinyinDisplay = document.getElementById('pinyinDisplay');
        const meaningDisplay = document.getElementById('meaningDisplay');

        // カテゴリを選択して学習開始
        function startCategory(category) {
            const url = CATEGORY_URLS[category];
            if (!url) {
                alert("このカテゴリは準備中です");
                return;
            }

            // 画面切り替え
            menuScreen.style.display = 'none';
            appScreen.style.display = 'flex';

            // データ読み込み
            loadVocabulary(url);
        }

        // メニューに戻る
        function showMenu() {
            appScreen.style.display = 'none';
            menuScreen.style.display = 'block';
            // データをリセットしても良いが、今回はそのまま
        }

        // CSVデータを取得してパースする関数
        async function loadVocabulary(sheetUrl) {
            vocabulary = []; // リセット
            wordDisplay.textContent = "読み込み中...";
            meaningDisplay.style.display = "none";
            pinyinDisplay.style.display = "none";

            try {
                const text = await fetchCSVText(sheetUrl);
                vocabulary = parseCSV(text);

                if (vocabulary.length > 0) {
                    currentIndex = 0;
                    updateCard();
                } else {
                    useDefaultData("データがありません");
                }
            } catch (error) {
                console.error('Error loading CSV:', error);
                useDefaultData("読み込みエラー");
            }
        }

        async function fetchCSVText(sheetUrl) {
            const cacheBustedUrl = sheetUrl + (sheetUrl.includes('?') ? '&' : '?') + 'cacheBust=' + Date.now();
            const urls = [
                cacheBustedUrl,
                PROXY_URL + encodeURIComponent(cacheBustedUrl)
            ];

            let lastError;
            for (const url of urls) {
                try {
                    const response = await fetchWithTimeout(url, FETCH_TIMEOUT_MS);
                    if (!response.ok) throw new Error('Network response was not ok');
                    return await response.text();
                } catch (error) {
                    lastError = error;
                }
            }
            throw lastError;
        }

        function fetchWithTimeout(url, timeoutMs) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), timeoutMs);

            return fetch(url, { signal: controller.signal })
                .finally(() => clearTimeout(timeoutId));
        }

        function useDefaultData(message) {
            console.log(message + ", using default data.");
            vocabulary = defaultData;
            currentIndex = 0;
            updateCard();
        }

        // 簡易CSVパーサー
        function parseCSV(csvText) {
            const lines = csvText.trim().split('\n');
            const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/[^a-z]/g, ''));

            return lines.slice(1)
                .filter(line => line.trim() !== '')
                .map(line => {
                    const values = line.split(',');
                    const entry = {};
                    headers.forEach((header, index) => {
                        entry[header] = values[index] ? values[index].trim() : '';
                    });
                    return entry;
                });
        }

        // カードの内容を更新する関数
        function updateCard() {
            if (vocabulary.length === 0) return;
            const currentItem = vocabulary[currentIndex];
            wordDisplay.textContent = currentItem.word;
            pinyinDisplay.textContent = currentItem.pinyin;
            meaningDisplay.textContent = currentItem.meaning;

            // 新しいカードになったら答えを隠す
            card.classList.remove('show-answer');
            meaningDisplay.style.display = 'none';
            pinyinDisplay.style.display = 'none';
        }

        // 答えの表示/非表示を切り替え
        function toggleAnswer() {
            const isHidden = meaningDisplay.style.display === 'none' || meaningDisplay.style.display === '';
            if (isHidden) {
                meaningDisplay.style.display = 'block';
                pinyinDisplay.style.display = 'block';
                card.classList.add('show-answer');
            } else {
                meaningDisplay.style.display = 'none';
                pinyinDisplay.style.display = 'none';
                card.classList.remove('show-answer');
            }
        }

        // 次の単語へ
        function nextWord(event) {
            if (event) event.stopPropagation();
            if (vocabulary.length === 0) return;
            currentIndex = (currentIndex + 1) % vocabulary.length;
            updateCard();
        }

        // 前の単語へ
        function previousWord(event) {
            if (event) event.stopPropagation();
            if (vocabulary.length === 0) return;
            currentIndex = (currentIndex - 1 + vocabulary.length) % vocabulary.length;
            updateCard();
        }

        // 音声を再生（Web Speech API）
        function speakWord(event) {
            if (event) event.stopPropagation();
            if (vocabulary.length === 0) return;

            // 発音時は答えを表示する
            card.classList.add('show-answer');
            meaningDisplay.style.display = 'block';
            pinyinDisplay.style.display = 'block';

            const text = vocabulary[currentIndex].word;
            const utterance = new SpeechSynthesisUtterance(text);

            const voices = speechSynthesis.getVoices();
            const chineseVoice = voices.find(voice => voice.lang === 'zh-CN') ||
                voices.find(voice => voice.lang.includes('zh'));

            if (chineseVoice) {
                utterance.voice = chineseVoice;
                utterance.lang = chineseVoice.lang;
            } else {
                utterance.lang = 'zh-CN';
            }

            utterance.rate = 0.8;
            speechSynthesis.speak(utterance);
        }

        // 音声リスト読み込み待機
        speechSynthesis.onvoiceschanged = () => {
            console.log("Voices loaded");
        };
    </script>
</body>

</html>
